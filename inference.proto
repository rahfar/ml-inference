syntax = "proto3";

package inference;

service Inference {
  rpc Predict      (PredictRequest)      returns (PredictResponse);
  rpc PredictBatch (PredictBatchRequest) returns (PredictBatchResponse);
  rpc Health       (HealthRequest)       returns (HealthResponse);
}

// One AIS observation: position + kinematics
message TrackPoint {
  float lat        = 1;
  float lon        = 2;
  float speed      = 3;
  float course_sin = 4;
  float course_cos = 5;
}

// One forecast waypoint
message FuturePoint {
  float lat = 1;
  float lon = 2;
}

message PredictRequest {
  repeated TrackPoint history = 1;  // 30 points (5 min @ 10-sec intervals)
}

message PredictResponse {
  repeated FuturePoint prediction = 1;  // 15 points (15 min @ 1-min intervals)
}

message PredictBatchRequest {
  repeated PredictRequest vessels = 1;  // N vessels (e.g. 100)
}

message PredictBatchResponse {
  repeated PredictResponse predictions = 1;  // N results
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}
