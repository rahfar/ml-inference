[project]
name = "ml-inference"
version = "0.1.0"
description = "ML inference benchmark: PyTorch LSTM via FastAPI and gRPC"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "catboost",
    "torch",
    "numpy",
    "fastapi",
    "uvicorn[standard]",
    "orjson",
    "psutil",
    "httpx",
    "grpcio",
    "grpcio-tools",
    "redis",
    "rq",
]
